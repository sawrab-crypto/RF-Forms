let FB_STAFF=[];
let FB_FORMS_META={};
let FB_SUBMISSIONS={};
let FB_READY=false;

async function fbInit(){
  // Seed defaults if Firebase is empty
  const [staffSnap,formsSnap]=await Promise.all([
    get(ref(db,"staff")),get(ref(db,"forms_meta"))
  ]);
  if(!staffSnap.exists()){
    const obj={};
    DEFAULT_STAFF.forEach((s,i)=>{obj["s"+i]={...s};});
    await set(ref(db,"staff"),obj);
  }
  if(!formsSnap.exists()){
    await set(ref(db,"forms_meta"),DEFAULT_FORMS_META);
  }
  // Live listeners
  onValue(ref(db,"staff"),snap=>{
    const d=snap.val()||{};
    FB_STAFF=Object.entries(d).map(([k,v])=>({...v,_key:k}));
    if(FB_READY) render();
  });
  onValue(ref(db,"forms_meta"),snap=>{
    FB_FORMS_META=snap.val()||{};
    if(FB_READY) render();
  });
  onValue(ref(db,"submissions"),snap=>{
    FB_SUBMISSIONS=snap.val()||{};
    if(FB_READY) render();
  });
  FB_READY=true;
  S.screen="login";
  render();
}

function getStaff(){return FB_STAFF.length?FB_STAFF:DEFAULT_STAFF;}
function getFormsMeta(){return Object.keys(FB_FORMS_META).length?FB_FORMS_META:DEFAULT_FORMS_META;}

// Firebase write helpers
async function fbSaveStaff(key,data){
  if(key) await update(ref(db,"staff/"+key),data);
  else await push(ref(db,"staff"),data);
}
async function fbDeleteStaff(key){await remove(ref(db,"staff/"+key));}
async function fbSaveFormMeta(name,data){await set(ref(db,"forms_meta/"+name),data);}
async function fbDeleteFormMeta(name){await remove(ref(db,"forms_meta/"+name));}
async function fbSaveField(formName,fd){
  const key=fd._key||("f"+Date.now());
  const d={...fd};delete d._key;
  await set(ref(db,"custom_fields/"+formName.replace(/ /g,"_")+"/"+key),d);
}
async function fbDeleteField(formName,key){
  await remove(ref(db,"custom_fields/"+formName.replace(/ /g,"_")+"/"+key));
}
async function fbGetFields(formName){
  const snap=await get(ref(db,"custom_fields/"+formName.replace(/ /g,"_")));
  if(!snap.exists()) return [];
  return Object.entries(snap.val()).map(([k,v])=>({...v,_key:k}));
}

}

// ── UTILITIES ─────────────────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,"0");}
function nowTime(){const n=new Date();return pad(n.getHours())+":"+pad(n.getMinutes());}
function nowDate(){return new Date().toISOString().slice(0,10);}
function toStr(forms){
  if(!forms) return "";
  if(forms==="ALL") return "ALL";
  if(Array.isArray(forms)) return forms.join(",");
  return String(forms);
}
function toArr(forms){
  if(!forms) return [];
  if(forms==="ALL") return Object.keys(getFormsMeta());
  if(Array.isArray(forms)) return forms.filter(Boolean);
  return String(forms).split(",").map(s=>s.trim()).filter(Boolean);
}
function getUserForms(u){
  if(!u) return [];
  if(!u.forms||u.forms==="ALL") return Object.keys(getFormsMeta());
  return toArr(u.forms);
}
function toast(msg,ms=2500){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.display="block";
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display="none",ms);
}
function sendWA(num,msg){window.open("https://wa.me/"+num+"?text="+encodeURIComponent(msg),"_blank");}
function sendAlerts(fails,fn,who){
  if(!fails.length) return;
  const now=new Date().toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"});
  let msg="🚨 *RF Forms Alert — "+fn+"*\n"+now+" · "+who+"\n\n";
  fails.forEach(f=>msg+="• "+f+"\n");
  getStaff().filter(s=>s.alerts).forEach(r=>sendWA(r.wa,msg));
}
function afterSubmit(fn){
  showPostSubmitModal(fn);
}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function el(tag,style,children,attrs){
  const e=document.createElement(tag);
  if(style) Object.assign(e.style,style);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="id") e.id=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(children!=null){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false) return;
      e.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return e;
}
function div(s,c,a){return el("div",s,c,a);}
function span(s,t){const e=el("span",s);if(t!=null)e.textContent=t;return e;}
function btn(s,t,fn){
  const b=el("button",s);
  b.textContent=t;
  b.addEventListener("click",fn);
  return b;
}
function inp(s,a){return el("input",s,null,a);}
function ta(s,a){return el("textarea",s,null,a);}

  const h=div({background:"#1a1814",borderBottom:"1px solid "+C.border,
    padding:"14px 18px",display:"flex",alignItems:"center",gap:"10px"});
  if(onBack){
    h.appendChild(btn({background:C.surface,border:"1px solid "+C.border,
      borderRadius:"8px",color:C.text,padding:"8px 14px",fontSize:"14px",
      fontWeight:"700"},backLabel||"← Back",onBack));
  } else {
    h.appendChild(div({width:"30px",height:"30px",background:C.amber,
      borderRadius:"7px",display:"flex",alignItems:"center",
      justifyContent:"center",fontSize:"15px",flexShrink:"0"},"◉"));
  }
  const mid=div({flex:"1",marginLeft:onBack?"4px":"0"});
  const te=div({fontSize:"15px",fontWeight:"800",color:C.text});
  te.textContent=title;mid.appendChild(te);
  if(sub){const se=div({fontSize:"12px",color:C.muted});se.textContent=sub;mid.appendChild(se);}
  h.appendChild(mid);
  if(rightBtns)(Array.isArray(rightBtns)?rightBtns:[rightBtns]).forEach(b=>b&&h.appendChild(b));
  return h;
}

function secHdr(title,color,icon){
  const r=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px",marginTop:"4px"});
  r.appendChild(span({fontSize:"16px"},icon||"◉"));
  r.appendChild(span({fontSize:"11px",fontWeight:"800",color,
    letterSpacing:"0.07em",textTransform:"uppercase"},title));
  r.appendChild(div({flex:"1",height:"1px",background:color+"33",marginLeft:"4px"}));
  return r;
}

function wrap(){return div({padding:"16px 18px",maxWidth:"500px",margin:"0 auto"});}

function submitBtn(label,color,onClick){
  return btn({width:"100%",border:"none",borderRadius:"12px",background:color||C.amber,
    color:"#fff",fontWeight:"800",fontSize:"17px",padding:"15px",marginTop:"8px"},label,onClick);
}

// ── FIELD WIDGETS ─────────────────────────────────────────────────────────────
function fieldWrap(label,hint){
  const w=div({marginBottom:"16px"});
  const lb=div({marginBottom:"7px"});
  lb.appendChild(span({fontSize:"15px",fontWeight:"700",color:C.text},label));
  if(hint) lb.appendChild(span({fontSize:"11px",color:C.muted,marginLeft:"6px"},hint));
  w.appendChild(lb);
  return w;
}

function makeDropdown(label,hint,options,value,onChange,allowOther){
  const w=fieldWrap(label,hint);
  const wrap2=div({position:"relative"});
  const sel=el("select",{width:"100%",background:"#1e1b18",
    border:"2px solid "+C.border,borderRadius:"10px",color:C.text,
    fontSize:"15px",fontWeight:"600",padding:"11px 40px 11px 14px",outline:"none"});
  const ph=document.createElement("option");
  ph.value="";ph.textContent="— Select —";
  ph.style.cssText="color:rgba(240,237,232,0.45);background:#1e1b18;";
  sel.appendChild(ph);
  options.forEach(o=>{
    const opt=document.createElement("option");
    opt.value=o;opt.textContent=o;opt.style.cssText="background:#1e1b18;color:#F0EDE8;";
    if(value===o) opt.selected=true;
    sel.appendChild(opt);
  });
  if(allowOther){
    const oo=document.createElement("option");
    oo.value="__other__";oo.textContent="Other (type below)";
    oo.style.cssText="background:#1e1b18;color:#F0EDE8;";
    if(value==="__other__") oo.selected=true;
    sel.appendChild(oo);
  }
  sel.addEventListener("change",e=>{
    sel.style.color=C.text;
    onChange(e.target.value);
    otherBox.style.display=e.target.value==="__other__"?"block":"none";
  });
  wrap2.appendChild(sel);
  wrap2.appendChild(span({position:"absolute",right:"14px",top:"50%",
    transform:"translateY(-50%)",pointerEvents:"none",color:C.amber,fontSize:"12px"},"▼"));
  w.appendChild(wrap2);
  const otherBox=inp({width:"100%",background:"rgba(255,255,255,0.07)",
    border:"2px solid "+C.border,borderRadius:"10px",color:C.text,
    fontSize:"15px",padding:"11px 14px",outline:"none",
    marginTop:"8px",display:value==="__other__"?"block":"none"},
    {type:"text",placeholder:"Type here…"});
  otherBox.addEventListener("input",e=>onChange("__other__:"+e.target.value));
  w.appendChild(otherBox);
  return w;
}

function makeToggle(label,hint,options,value,onChange,critFn){
  const w=fieldWrap(label,hint);
  const row=div({display:"flex",gap:"7px",flexWrap:options.length>4?"wrap":"nowrap"});
  const btns=[];
  options.forEach(opt=>{
    const bad=critFn&&critFn(opt),col=bad?C.red:C.green,sel=value===opt;
    const b=btn({flex:options.length>4?"0 0 calc(50% - 4px)":"1",padding:"11px 4px",
      border:"2px solid "+(sel?col:C.border),borderRadius:"10px",
      background:sel?col+"25":C.surface,color:sel?col:C.muted,
      fontWeight:"700",fontSize:"14px",textAlign:"center"},opt,()=>{
      onChange(opt);
      btns.forEach(({b:bb,o})=>{
        const s=o===opt,bc=critFn&&critFn(o)?C.red:C.green;
        bb.style.border="2px solid "+(s?bc:C.border);
        bb.style.background=s?bc+"25":C.surface;
        bb.style.color=s?bc:C.muted;
      });
    });
    btns.push({b,o:opt});row.appendChild(b);
  });
  w.appendChild(row);return w;
}

function makeRating(label,hint,value,onChange){
  const w=fieldWrap(label,hint);
  const row=div({display:"flex",gap:"6px"});
  const btns=[];
  [1,2,3,4,5].forEach(n=>{
    const col=n<=2?C.red:n===3?C.amber:C.green,sel=value===n;
    const b=btn({flex:"1",padding:"11px 0",border:"2px solid "+(sel?col:C.border),
      borderRadius:"10px",background:sel?col+"28":C.surface,
      color:sel?col:C.muted,fontWeight:"800",fontSize:"17px"},String(n),()=>{
      onChange(n);
      btns.forEach(({b:bb,n:nn})=>{
        const s=nn===n,bc=nn<=2?C.red:nn===3?C.amber:C.green;
        bb.style.border="2px solid "+(s?bc:C.border);
        bb.style.background=s?bc+"28":C.surface;
        bb.style.color=s?bc:C.muted;
      });
    });
    btns.push({b,n});row.appendChild(b);
  });
  w.appendChild(row);return w;
}

function makeNumber(label,hint,unit,value,onChange,critFn){
  const w=fieldWrap(label,hint);
  const row=div({display:"flex",alignItems:"center",gap:"8px"});
  const i=inp({flex:"1",background:"rgba(255,255,255,0.07)",
    border:"2px solid "+C.border,borderRadius:"10px",color:C.text,
    fontSize:"19px",fontWeight:"700",fontFamily:"'DM Mono',monospace",
    padding:"10px 14px",outline:"none"},{type:"number",inputmode:"decimal",placeholder:"—"});
  i.value=value??"";
  i.addEventListener("input",e=>{
    onChange(e.target.value);
    i.style.borderColor=critFn&&critFn(e.target.value)?C.red:C.border;
    i.style.color=critFn&&critFn(e.target.value)?C.red:C.text;
  });
  row.appendChild(i);
  if(unit) row.appendChild(span({fontSize:"13px",fontWeight:"700",color:C.amber,minWidth:"28px"},unit));
  w.appendChild(row);return w;
}

function makeText(label,hint,placeholder,value,onChange,rows){
  const w=fieldWrap(label,hint);
  const t=ta({width:"100%",background:C.surface,border:"1.5px solid "+C.border,
    borderRadius:"10px",color:C.text,fontSize:"14px",padding:"10px 12px",
    outline:"none",resize:"none",display:"block"},{placeholder:placeholder||"",rows:String(rows||2)});
  t.value=value??"";
  t.addEventListener("input",e=>onChange(e.target.value));
  w.appendChild(t);return w;
}

function makeDate(label,value,onChange){
  const w=fieldWrap(label,"");
  const i=inp({width:"100%",background:"rgba(255,255,255,0.07)",
    border:"2px solid "+C.border,borderRadius:"10px",color:C.text,
    fontSize:"15px",fontWeight:"600",padding:"11px 14px",outline:"none",display:"block"},
    {type:"date"});
  i.value=value||nowDate();
  if(!value) onChange(nowDate());
  i.addEventListener("change",e=>onChange(e.target.value));
  w.appendChild(i);return w;
}

function makeTime(label,hint,value,onChange){
  const w=fieldWrap(label,hint);
  const row=div({display:"flex",gap:"8px"});
  const i=inp({flex:"1",background:"rgba(255,255,255,0.07)",
    border:"2px solid "+C.border,borderRadius:"10px",color:C.text,
    fontSize:"17px",fontWeight:"700",fontFamily:"'DM Mono',monospace",
    padding:"10px 14px",outline:"none"},{type:"text",placeholder:"HH:MM"});
  i.value=value??"";
  i.addEventListener("input",e=>onChange(e.target.value));
  const nb=btn({background:C.amber+"18",border:"1.5px solid "+C.amber+"55",
    borderRadius:"8px",color:C.amber,fontWeight:"800",fontSize:"12px",
    padding:"8px 12px",whiteSpace:"nowrap"},"Now",()=>{
    const t=nowTime();i.value=t;onChange(t);
  });
  row.appendChild(i);row.appendChild(nb);w.appendChild(row);return w;
}

function makeMultiSelect(label,hint,options,selected,onChange){
  const w=fieldWrap(label,hint);
  const chips=div({display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"8px",minHeight:"24px"});
  function refreshChips(){
    chips.innerHTML="";
    const arr=selected||[];
    if(!arr.length){
      chips.appendChild(span({fontSize:"12px",color:C.muted},"None selected"));
      return;
    }
    arr.forEach(s=>{
      const c=div({background:C.amber+"22",border:"1px solid "+C.amber+"55",
        borderRadius:"20px",padding:"3px 8px",display:"inline-flex",alignItems:"center",gap:"4px"});
      c.appendChild(span({fontSize:"11px",fontWeight:"700",color:C.amber},s));
      const x=btn({background:"none",border:"none",color:C.amber,
        padding:"0",fontSize:"13px",lineHeight:"1"},"×",()=>{
        onChange((selected||[]).filter(i=>i!==s));
        refreshChips();
      });
      c.appendChild(x);chips.appendChild(c);
    });
  }
  refreshChips();w.appendChild(chips);
  w.appendChild(btn({width:"100%",background:C.surface,border:"2px solid "+C.border,
    borderRadius:"10px",color:C.muted,fontSize:"14px",fontWeight:"700",padding:"10px"},
    "+ Select",()=>showMultiModal(label,options,selected||[],arr=>{onChange(arr);refreshChips();})));
  return w;
}

function showMultiModal(title,options,current,onDone){
  const modal=document.getElementById("modal");
  const box=document.getElementById("modal-box");
  box.innerHTML="";
  const selected=new Set(current);
  const ttl=div({fontSize:"15px",fontWeight:"800",color:C.text,marginBottom:"12px"});
  ttl.textContent=title;box.appendChild(ttl);
  const ar=div({display:"flex",gap:"8px",marginBottom:"10px"});
  ar.appendChild(btn({background:C.surface,border:"1px solid "+C.border,borderRadius:"8px",
    color:C.muted,fontSize:"13px",padding:"6px 12px"},"Select All",
    ()=>{options.forEach(o=>selected.add(o));rl();}));
  ar.appendChild(btn({background:C.surface,border:"1px solid "+C.border,borderRadius:"8px",
    color:C.muted,fontSize:"13px",padding:"6px 12px"},"Clear All",
    ()=>{selected.clear();rl();}));
  box.appendChild(ar);
  const list=div({});box.appendChild(list);
  function rl(){
    list.innerHTML="";
    options.forEach(o=>{
      const sel=selected.has(o);
      const row=div({display:"flex",alignItems:"center",gap:"10px",
        padding:"9px 10px",background:sel?C.amber+"15":C.surface,
        border:"1.5px solid "+(sel?C.amber:C.border),borderRadius:"8px",
        marginBottom:"5px",cursor:"pointer"},null,{onClick:()=>{sel?selected.delete(o):selected.add(o);rl();}});
      const chk=div({width:"18px",height:"18px",border:"2px solid "+(sel?C.amber:C.border),
        borderRadius:"4px",background:sel?C.amber:"transparent",flexShrink:"0",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",color:"#000"},
        sel?"✓":"");
      row.appendChild(chk);
      row.appendChild(span({fontSize:"14px",fontWeight:"600",color:sel?C.amber:C.text},o));
      list.appendChild(row);
    });
  }
  rl();
  box.appendChild(div({height:"10px"}));
  const doneBtn=btn({width:"100%",background:C.amber,border:"none",borderRadius:"12px",
    color:"#000",fontWeight:"800",fontSize:"15px",padding:"13px"},"Done",
    ()=>{modal.classList.remove("open");onDone([...selected]);});
  box.appendChild(doneBtn);
  function updateDone(){doneBtn.textContent="Done — "+selected.size+" selected";}
  const origRl=rl;
  rl=()=>{origRl();updateDone();};
  updateDone();
  modal.classList.add("open");
  modal.onclick=e=>{if(e.target===modal){modal.classList.remove("open");}};
}

// shorthand getters/setters for flat form data
function gf(k){return S.fData[k];}
function sf(k,v){S.fData[k]=v;}
function gm(mc,k){return S.mcData[mc]?.[k];}
function sm(mc,k,v){if(!S.mcData[mc])S.mcData[mc]={};S.mcData[mc][k]=v;}

function renderLoading(){
  const w=div({minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",gap:"16px"});
  w.appendChild(div({width:"52px",height:"52px",background:C.amber,borderRadius:"14px",
    display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",color:"#000"},"◉"));
  w.appendChild(span({fontSize:"16px",color:C.muted},"Connecting to RF Forms…"));
  w.appendChild(span({fontSize:"13px",color:C.muted},"Please ensure internet connection"));
  setTimeout(()=>{
    if(S.screen!=="loading") return;
    w.appendChild(btn({background:C.surface,border:"1px solid "+C.border,borderRadius:"10px",
      color:C.muted,padding:"10px 24px",fontSize:"14px",fontWeight:"700",marginTop:"8px"},
      "Continue without sync",()=>{FB_READY=true;S.screen="login";render();}));
  },4000);
  setTimeout(()=>{if(S.screen==="loading"){FB_READY=true;S.screen="login";render();}},8000);
  return w;
}

function renderLogin(){
  const w=div({minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",padding:"0 24px"});
  w.appendChild(div({width:"52px",height:"52px",background:C.amber,borderRadius:"14px",
    display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",
    marginBottom:"16px",color:"#000"},"◉"));
  w.appendChild(span({fontSize:"22px",fontWeight:"800",marginBottom:"4px"},"RF Forms"));
  w.appendChild(span({fontSize:"14px",color:C.muted,marginBottom:"40px"},"RF Factory · Dehradun"));
  const dots=div({display:"flex",gap:"14px",marginBottom:S.pinError?"20px":"36px"});
  for(let i=0;i<4;i++){
    const filled=i<S.pin.length,err=S.pinError;
    dots.appendChild(div({width:"14px",height:"14px",borderRadius:"50%",
      border:"2px solid "+(err?C.red:filled?C.amber:C.border),
      background:err?C.red:filled?C.amber:"rgba(255,255,255,0.15)",
      transition:"background 0.15s"}));
  }
  w.appendChild(dots);
  if(S.pinError){
    const e=div({fontSize:"14px",color:C.red,marginBottom:"20px",textAlign:"center"});
    e.textContent="Incorrect PIN";w.appendChild(e);
  }
  const pad=div({display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",
    width:"100%",maxWidth:"260px"});
  [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(d=>{
    if(d===""){pad.appendChild(div({padding:"18px"}));return;}
    if(d==="⌫"){
      pad.appendChild(btn({background:"rgba(232,92,56,0.12)",
        border:"1.5px solid rgba(232,92,56,0.27)",borderRadius:"14px",
        color:C.red,fontSize:"22px",fontWeight:"700",padding:"18px 0"},d,
        ()=>ss({pin:S.pin.slice(0,-1),pinError:false})));
      return;
    }
    pad.appendChild(btn({background:C.surface,border:"1.5px solid "+C.border,
      borderRadius:"14px",color:C.text,fontSize:"22px",fontWeight:"700",padding:"18px 0"},
      String(d),()=>handlePin(String(d))));
  });
  w.appendChild(pad);return w;
}

function handlePin(d){
  if(S.pinError) ss({pinError:false,pin:""});
  const next=S.pin+d;
  if(next.length<4){ss({pin:next});return;}
  const found=getStaff().find(u=>u.pin===next);
  if(found) ss({user:{...found},screen:"home",pin:"",pinError:false});
  else{ss({pin:next,pinError:true});setTimeout(()=>ss({pin:"",pinError:false}),800);}
}

function renderHome(){
  const u=S.user;
  const forms=getUserForms(u);
  const meta=getFormsMeta();
  const w=div({minHeight:"100vh",background:C.bg});
  // Build header buttons
  const hBtns=[];
  if(u.isAdmin) hBtns.push(btn({background:"rgba(240,165,0,0.15)",
    border:"1px solid rgba(240,165,0,0.4)",borderRadius:"8px",color:C.amber,
    padding:"7px 10px",fontSize:"13px",fontWeight:"700"},"⚙ Admin",
    ()=>ss({screen:"admin",adminTab:"staff",editingStaff:null,editingFormMeta:null,editingField:null,editingFieldForm:null})));
  if(u.canReport||u.isAdmin) hBtns.push(btn({background:"rgba(45,212,160,0.12)",
    border:"1px solid rgba(45,212,160,0.4)",borderRadius:"8px",color:C.green,
    padding:"7px 10px",fontSize:"13px",fontWeight:"700"},"📊 Reports",
    ()=>ss({screen:"reports",reportForm:null,reportRange:"today"})));
  hBtns.push(btn({background:"rgba(232,92,56,0.1)",border:"none",borderRadius:"8px",
    color:C.red,padding:"7px 10px",fontSize:"13px"},"Logout",
    ()=>ss({screen:"login",user:null,pin:""})));
  w.appendChild(makeHdr("RF Forms",u.name+" · "+u.role+(u.shift?" ("+u.shift+")":""),hBtns));
  const bdy=wrap();
  const today=new Date().toDateString();
  const todayC=forms.reduce((a,fn)=>a+getFormLogs(fn).filter(l=>new Date(l.timestamp).toDateString()===today).length,0);
  const stats=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"20px"});
  [{label:"Today's Submissions",val:todayC,col:C.amber},{label:"Forms Available",val:forms.length,col:C.blue}].forEach(s=>{
    const c=div({background:C.surface,border:"1px solid "+C.border,borderRadius:"12px",padding:"14px 16px"});
    c.appendChild(div({fontSize:"28px",fontWeight:"800",color:s.col,fontFamily:"'DM Mono',monospace",lineHeight:"1"},String(s.val)));
    c.appendChild(div({fontSize:"13px",color:C.muted,marginTop:"4px"},s.label));
    stats.appendChild(c);
  });
  bdy.appendChild(stats);
  bdy.appendChild(div({fontSize:"11px",fontWeight:"800",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"12px"},"Your Forms"));
  forms.forEach(fn=>{
    const m=meta[fn]||{icon:"◉",color:C.amber,desc:""};
    const tl=getFormLogs(fn).filter(l=>new Date(l.timestamp).toDateString()===today);
    const card=div({background:C.surface,border:"1px solid "+C.border,borderRadius:"14px",
      padding:"16px",marginBottom:"10px",display:"flex",alignItems:"center",
      gap:"14px",cursor:"pointer"},null,{onClick:()=>startForm(fn)});
    card.appendChild(div({width:"44px",height:"44px",background:(m.color||C.amber)+"22",
      border:"1.5px solid "+(m.color||C.amber)+"55",borderRadius:"12px",
      display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:"0"},
      m.icon||"◉"));
    const info=div({flex:"1"});
    info.appendChild(div({fontSize:"15px",fontWeight:"800",color:C.text},fn));
    info.appendChild(div({fontSize:"12px",color:C.muted,marginTop:"2px"},m.desc||""));
    card.appendChild(info);
    const right=div({textAlign:"right",flexShrink:"0"});
    if(tl.length){
      right.appendChild(div({fontSize:"18px",fontWeight:"800",color:m.color||C.amber,fontFamily:"'DM Mono',monospace"},String(tl.length)));
      right.appendChild(div({fontSize:"11px",color:C.muted},"today"));
    }
    right.appendChild(span({fontSize:"18px",color:C.muted,display:"block",marginTop:"4px"},"→"));
    card.appendChild(right);bdy.appendChild(card);
  });
  if(u.alerts||u.reports||u.isAdmin){
    bdy.appendChild(div({height:"1px",background:C.border,margin:"20px 0"}));
    bdy.appendChild(btn({width:"100%",background:"rgba(45,212,160,0.1)",
      border:"2px solid rgba(45,212,160,0.4)",borderRadius:"12px",color:C.green,
      fontWeight:"800",fontSize:"16px",padding:"14px"},"📊 Send Today's Report",sendDailyReport));
  }
  bdy.appendChild(div({height:"30px"}));
  w.appendChild(bdy);return w;
}

function renderAdmin(){
  const w=div({minHeight:"100vh",background:C.bg});
  w.appendChild(makeHdr("⚙ Admin Panel",S.user.name+" · MD",[],()=>ss({screen:"home"}),"← Home"));
  const tabs=div({display:"flex",borderBottom:"2px solid "+C.border,background:"#1a1814"});
  [{id:"staff",label:"👥 Staff"},{id:"forms",label:"📋 Forms"},{id:"fields",label:"⚙ Fields"}].forEach(tab=>{
    const sel=(S.adminTab||"staff")===tab.id;
    tabs.appendChild(btn({flex:"1",padding:"14px 4px",border:"none",
      borderBottom:"3px solid "+(sel?C.amber:"transparent"),
      background:sel?"rgba(240,165,0,0.08)":"none",
      color:sel?C.amber:C.text,fontWeight:"800",fontSize:"15px"},
      tab.label,()=>ss({adminTab:tab.id,editingStaff:null,editingFormMeta:null,editingField:null})));
  });
  w.appendChild(tabs);
  const bdy=wrap();
  try{
    const t=S.adminTab||"staff";
    if(t==="staff") renderAdminStaff(bdy);
    else if(t==="forms") renderAdminForms(bdy);

    const em=div({padding:"20px",color:C.red,fontSize:"14px",lineHeight:"1.6"});

    bdy.appendChild(em);
    console.error("Admin tab error:",e);
  }
  bdy.appendChild(div({height:"40px"}));w.appendChild(bdy);return w;
}

function aInp(label,key,obj,placeholder,type){
  const rw=div({marginBottom:"12px"});
  const lb=div({fontSize:"13px",fontWeight:"700",color:C.text,marginBottom:"5px"});
  lb.textContent=label;rw.appendChild(lb);
  const i=inp({width:"100%",background:"rgba(255,255,255,0.07)",
    border:"1.5px solid "+C.border,borderRadius:"8px",color:C.text,
    fontSize:"14px",padding:"9px 12px",outline:"none"},
    {type:type||"text",placeholder:placeholder||""});
  i.value=String(obj[key]||"");
  i.addEventListener("input",e=>{obj[key]=e.target.value;});
  rw.appendChild(i);return rw;
}

function renderAdminStaff(bdy){

function appendCustomFields(bdy,fn){
  // Appends any admin-added custom fields to the bottom of a built-in form
  fbGetFields(fn).then(fields=>{
    if(!fields.length) return;
    bdy.appendChild(div({height:"1px",background:C.border,margin:"16px 0"}));
    bdy.appendChild(div({fontSize:"11px",fontWeight:"800",color:C.muted,
      letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"12px"},"Additional Fields"));
    fields.forEach(f=>{
      const opts=(f.options||"").split(",").map(s=>s.trim()).filter(Boolean);
      if(f.type==="dropdown") bdy.appendChild(makeDropdown(f.label,f.hint||"",opts,gf(f.label),v=>sf(f.label,v)));
      else if(f.type==="toggle") bdy.appendChild(makeToggle(f.label,f.hint||"",opts,gf(f.label),v=>sf(f.label,v)));
      else if(f.type==="multi_select") bdy.appendChild(makeMultiSelect(f.label,f.hint||"",opts,gf(f.label)||[],v=>sf(f.label,v)));
      else if(f.type==="rating5") bdy.appendChild(makeRating(f.label,f.hint||"",gf(f.label),v=>sf(f.label,v)));
      else if(f.type==="number") bdy.appendChild(makeNumber(f.label,f.hint||"",f.unit||"",gf(f.label),v=>sf(f.label,v)));
      else if(f.type==="date") bdy.appendChild(makeDate(f.label,gf(f.label),v=>sf(f.label,v)));
      else if(f.type==="time") bdy.appendChild(makeTime(f.label,f.hint||"",gf(f.label),v=>sf(f.label,v)));
      else bdy.appendChild(makeText(f.label,f.hint||"","",gf(f.label),v=>sf(f.label,v)));
    });
  }).catch(e=>console.error("Custom fields error:",e));
}

      top.appendChild(span({fontSize:"14px",fontWeight:"700",color:sel?meta.color:C.text},issue));
      row.appendChild(top);
      row.addEventListener("click",()=>{
        if(sel) S.breakdownIssues=S.breakdownIssues.filter(i=>i!==issue);

        ri();

      if(sel){
        const det=el("textarea",{width:"100%",background:"rgba(255,255,255,0.07)",border:"1.5px solid "+C.border,borderRadius:"8px",color:C.text,fontSize:"13px",padding:"8px 10px",outline:"none",resize:"none",marginTop:"8px",display:"block"},null,{placeholder:"Details for "+issue+"…",rows:"2"});
        det.value=S.breakdownDetails[issue]??"";
        det.addEventListener("click",e=>e.stopPropagation());

        row.appendChild(det);

function renderViewer(){
  const log=S.viewingLog;
  if(!log) return renderHistory();
  const meta=getFormsMeta()[log.formName]||{icon:"◉",color:C.amber};
  const w=div({minHeight:"100vh",background:C.bg});
  w.appendChild(makeHdr(log.formName,
    new Date(log.timestamp).toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}),
    null,()=>ss({screen:"history"}),"← Back"));
  w.appendChild(div({height:"3px",background:meta.color||C.amber}));
  const bdy=wrap();
  const mc=div({background:(meta.color||C.amber)+"10",border:"1px solid "+(meta.color||C.amber)+"44",
    borderRadius:"12px",padding:"12px 16px",marginBottom:"16px"});
  mc.appendChild(div({fontSize:"14px",fontWeight:"800",color:meta.color||C.amber},(meta.icon||"◉")+" "+log.formName));
  mc.appendChild(div({fontSize:"13px",color:C.muted,marginTop:"4px"},"By: "+log.user+" ("+log.role+")"+(log.shift?" · "+log.shift:"")));
  bdy.appendChild(mc);
  function dr(k,v){
    if(v===null||v===undefined||v==="") return;
    const row=div({display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid "+C.border});
    row.appendChild(span({fontSize:"12px",color:C.muted,flex:"1"},String(k).replace(/_/g," ")));
    const ve=div({fontSize:"13px",fontWeight:"600",color:C.text,textAlign:"right",flex:"2"});
    ve.textContent=Array.isArray(v)?v.join(", "):String(v);
    row.appendChild(ve);bdy.appendChild(row);
  }
  function flatten(obj,pfx){
    if(!obj||typeof obj!=="object") return;
    Object.entries(obj).forEach(([k,v])=>{
      if(["_key","id","timestamp","formName","user","role","mode","shift"].includes(k)) return;
      const key=(pfx?pfx+" → ":"")+k;
      if(Array.isArray(v)) dr(key,v.join(", "));
      else if(typeof v==="object") flatten(v,key);
      else dr(key,v);
    });
  }
  if(log.entries) log.entries.forEach((e,i)=>{bdy.appendChild(div({fontSize:"14px",fontWeight:"800",color:meta.color||C.amber,marginTop:"14px",marginBottom:"6px"},"Visitor "+(i+1)));flatten(e,"");});
  else if(log.machineData) flatten(log.machineData,"");
  else if(log.data) flatten(log.data,"");
  if(log.issues) dr("Issues",log.issues.join(", "));
  if(log.worksCompleted) dr("Works Completed",log.worksCompleted.join(", "));
  bdy.appendChild(div({height:"40px"}));w.appendChild(bdy);return w;
}

      st.appendChild(div({fontSize:"14px",fontWeight:"800",color:m.color||C.amber},fn));
      st.appendChild(div({fontSize:"12px",color:C.muted},logs.length+" submission(s)"));
      sh.appendChild(st);
      sh.appendChild(btn({background:(m.color||C.amber)+"22",border:"1px solid "+(m.color||C.amber)+"55",
        borderRadius:"8px",color:m.color||C.amber,padding:"6px 10px",fontSize:"12px",fontWeight:"700"},
        "⬇ CSV",()=>exportCSV(fn,logs)));
      sec.appendChild(sh);
      logs.slice(0,3).forEach(log=>{
        const d=new Date(log.timestamp);
        const row=div({display:"flex",justifyContent:"space-between",padding:"6px 0",borderTop:"1px solid "+C.border});
        const l=div({});
        l.appendChild(div({fontSize:"12px",fontWeight:"700",color:C.text},log.user));
        l.appendChild(div({fontSize:"11px",color:C.muted},d.toLocaleDateString("en-IN")+" · "+d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})));
        row.appendChild(l);
        if(log.mode||log.shift) row.appendChild(span({fontSize:"10px",fontWeight:"700",color:m.color||C.amber,background:(m.color||C.amber)+"22",padding:"2px 6px",borderRadius:"10px"},log.mode||log.shift));
        sec.appendChild(row);
      });
      if(logs.length>3) sec.appendChild(div({fontSize:"12px",color:C.muted,textAlign:"center",padding:"6px 0",borderTop:"1px solid "+C.border},"+"+(logs.length-3)+" more"));
      bdy.appendChild(sec);
    });
  }
  bdy.appendChild(div({height:"16px"}));
  bdy.appendChild(btn({width:"100%",background:C.green,border:"none",borderRadius:"12px",
    color:"#000",fontWeight:"800",fontSize:"17px",padding:"15px"},
    "⬇ Download Master Excel",()=>downloadMasterExcel(S.reportForm,S.reportRange)));
  bdy.appendChild(div({height:"40px"}));w.appendChild(bdy);return w;
}

function getFilteredLogs(formFilter,range){
  const forms=formFilter?[formFilter]:Object.keys(getFormsMeta());
  const now=new Date();
  const logs=[];
  forms.forEach(fn=>{
    getFormLogs(fn).forEach(log=>{
      const d=new Date(log.timestamp);
      let ok=true;
      if(range==="today") ok=d.toDateString()===now.toDateString();
      else if(range==="week"){const w=new Date(now);w.setDate(now.getDate()-7);ok=d>=w;}
      else if(range==="month"){const m=new Date(now);m.setMonth(now.getMonth()-1);ok=d>=m;}
      if(ok) logs.push(log);
    });
  });
  return logs.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
}

function flattenLog(log){
  const flat={
    Date:new Date(log.timestamp).toLocaleDateString("en-IN"),
    Time:new Date(log.timestamp).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}),
    Staff:log.user||"",Role:log.role||"",Mode:log.mode||"",Shift:log.shift||"",
  };
  function ext(obj,pfx){
    if(!obj||typeof obj!=="object") return;
    Object.entries(obj).forEach(([k,v])=>{
      if(["_key","id","timestamp","formName","user","role","mode","shift"].includes(k)) return;
      const key=(pfx?pfx+" ":"")+k.replace(/_/g," ");
      if(Array.isArray(v)) flat[key]=v.join(", ");
      else if(typeof v==="object") ext(v,key);
      else if(v!==null&&v!==undefined) flat[key]=String(v);
    });
  }
  if(log.data) ext(log.data,"");
  if(log.machineData) ext(log.machineData,"");
  if(log.entries) log.entries.forEach((e,i)=>ext(e,"Visitor "+(i+1)));
  if(log.issues) flat["Issues"]=log.issues.join(", ");
  if(log.worksCompleted) flat["Works Completed"]=log.worksCompleted.join(", ");
  return flat;
}

function downloadMasterExcel(formFilter,range){
  if(typeof XLSX==="undefined"){toast("Excel library loading, please wait…");return;}
  const wb=XLSX.utils.book_new();
  const forms=formFilter?[formFilter]:Object.keys(getFormsMeta());
  const now=new Date();
  let sheets=0;
  forms.forEach(fn=>{
    const logs=getFilteredLogs(fn,range).filter(l=>l.formName===fn);
    if(!logs.length) return;
    const rows=logs.map(l=>flattenLog(l));
    const keys=[];const ks=new Set();
    rows.forEach(r=>Object.keys(r).forEach(k=>{if(!ks.has(k)){ks.add(k);keys.push(k);}}));
    const ws=XLSX.utils.aoa_to_sheet([keys,...rows.map(r=>keys.map(k=>r[k]||""))]);
    ws["!cols"]=keys.map(k=>({wch:Math.max(k.length,14)}));
    XLSX.utils.book_append_sheet(wb,ws,fn.slice(0,31));
    sheets++;
  });
  if(!sheets){toast("No data in selected range");return;}
  // Summary
  const sum=[["Form","Submissions","Range","Downloaded"]];
  forms.forEach(fn=>{const n=getFilteredLogs(fn,range).filter(l=>l.formName===fn).length;if(n)sum.push([fn,n,range,now.toLocaleString("en-IN")]);});
  const sw=XLSX.utils.aoa_to_sheet(sum);sw["!cols"]=[{wch:30},{wch:15},{wch:12},{wch:22}];
  XLSX.utils.book_append_sheet(wb,sw,"Summary");
  XLSX.writeFile(wb,"RF_Forms_"+(formFilter?formFilter.replace(/ /g,"_"):"Master")+"_"+range+"_"+now.toISOString().slice(0,10)+".xlsx");
  toast("✓ Excel downloaded — "+sheets+" sheet(s)");
}

function exportCSV(fn,logs){
  const rows=logs.map(l=>flattenLog(l));
  if(!rows.length) return;
  const keys=[];const ks=new Set();rows.forEach(r=>Object.keys(r).forEach(k=>{if(!ks.has(k)){ks.add(k);keys.push(k);}}));
  const csv=[keys,...rows.map(r=>keys.map(k=>'"'+String(r[k]||"").replace(/"/g,"'")+'"'))].map(r=>r.join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=fn.replace(/ /g,"_")+"_"+new Date().toISOString().slice(0,10)+".csv";a.click();
}

function sendDailyReport(){
  const today=new Date();
  const ds=today.toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  let msg="📋 *RF Factory — Daily Report*\n"+ds+"\n━━━━━━━━━━━━━━━━━━━━━━\n\n";
  let total=0;
  Object.keys(getFormsMeta()).forEach(fn=>{
    const logs=getFormLogs(fn).filter(l=>new Date(l.timestamp).toDateString()===today.toDateString());
    if(!logs.length) return;total+=logs.length;
    msg+=(getFormsMeta()[fn]?.icon||"◉")+" *"+fn+"*: "+logs.length+" submission(s)\n";
    msg+="  By: "+[...new Set(logs.map(l=>l.user))].join(", ")+"\n";
  });
  if(!total) msg+="No submissions today.\n";
  msg+="\n━━━━━━━━━━━━━━━━━━━━━━\n_RF Factory Forms App_";
  const recv=getStaff().filter(s=>s.reports||s.isAdmin);
  recv.forEach((r,i)=>setTimeout(()=>sendWA(r.wa,msg),i*1500));
  toast("📊 Report sent!");
}

// Missing makeDateField alias (used in some form renderers)
function makeDateField(label,value,onChange){return makeDate(label,value,onChange);}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(!app) return;
  try{
    app.innerHTML="";
    let screen;
    switch(S.screen){
      case "loading":  screen=renderLoading(); break;
      case "login":    screen=renderLogin(); break;
      case "home":     screen=renderHome(); break;
      case "form":     screen=renderForm(); break;
      case "admin":    screen=renderAdmin(); break;
      case "reports":  screen=renderReports(); break;
      case "history":  screen=renderHistory(); break;
      case "viewer":   screen=renderViewer(); break;
      default:         screen=renderLogin();
    }
    if(screen) app.appendChild(screen);
  } catch(e){
    console.error("Render error:",e);
    app.innerHTML="";
    const err=div({minHeight:"100vh",background:"#0F0E0C",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",textAlign:"center"});
    err.appendChild(div({fontSize:"32px",marginBottom:"16px"},"⚠"));
    err.appendChild(div({fontSize:"16px",fontWeight:"700",color:"#E85C38",marginBottom:"8px"},"Something went wrong"));
    err.appendChild(div({fontSize:"13px",color:"rgba(240,237,232,0.5)",marginBottom:"24px"},"Screen: "+S.screen+" · "+e.message));
    err.appendChild(btn({background:"#F0A500",border:"none",borderRadius:"10px",color:"#000",fontWeight:"800",fontSize:"15px",padding:"12px 24px"},"Reload App",()=>location.reload()));
    app.appendChild(err);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render(); // show loading screen immediately
fbInit().catch(e=>{
  console.error("Firebase init failed:",e);
  FB_READY=true;
  S.screen="login";
  render();
});
