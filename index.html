// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function el(tag,style,children,attrs){
  const e=document.createElement(tag);
  if(style) Object.assign(e.style,style);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="id") e.id=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(children!=null)(Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false) return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}
function div(style,children,attrs){return el("div",style,children,attrs);}
function span(style,text){const e=el("span",style);e.textContent=text;return e;}
function btn(style,text,onClick){
  const b=el("button",style);b.textContent=text;
  b.addEventListener("click",onClick);return b;
}

function fieldWrap(label,hint){
  const w=div({marginBottom:"16px"});
  const lbl=div({marginBottom:"7px"});
  lbl.appendChild(span({fontSize:"15px",fontWeight:"700",color:C.text},label));
  if(hint) lbl.appendChild(span({fontSize:"11px",color:C.muted,marginLeft:"6px"},hint));
  w.appendChild(lbl);
  return w;
}

function makeDropdown(label,hint,options,value,onChange,allowOther){
  const w=fieldWrap(label,hint);
  const wrap=div({position:"relative"});
  const sel=el("select",{width:"100%",background:"#1e1b18",
    border:"2px solid "+C.border,borderRadius:"10px",color:C.text,
    fontSize:"15px",fontWeight:"600",padding:"11px 40px 11px 14px",outline:"none",cursor:"pointer",
    WebkitAppearance:"none",MozAppearance:"none",appearance:"none"},
    null,{onChange:e=>{onChange(e.target.value);}});
  const placeholder=el("option",null,"— Select —");
  placeholder.value="";
  Object.assign(placeholder.style,{color:"rgba(240,237,232,0.45)",background:"#1e1b18"});
  sel.appendChild(placeholder);
  options.forEach(o=>{
    const opt=el("option",null,o);opt.value=o;
    if(value===o) opt.selected=true;
    Object.assign(opt.style,{background:"#1e1b18",color:"#F0EDE8"});
    sel.appendChild(opt);
  });
  if(allowOther){
    const oo=el("option",null,"Other (type below)");oo.value="__other__";
    if(value==="__other__") oo.selected=true;
    Object.assign(oo.style,{background:"#1e1b18",color:"#F0EDE8"});
    sel.appendChild(oo);
  }
  if(value) sel.value=value;
  // Force color after value set
  sel.style.color=sel.value??"" === "" ? "rgba(240,237,232,0.45)" : "#F0EDE8";
  sel.addEventListener("change",e=>{
    e.target.style.color="#F0EDE8";
  });
  wrap.appendChild(sel);
  wrap.appendChild(span({position:"absolute",right:"14px",top:"50%",
    transform:"translateY(-50%)",pointerEvents:"none",color:C.amber,fontSize:"12px"},"▼"));
  w.appendChild(wrap);
  // Other text box
  if(allowOther){
    const otherBox=el("input",{width:"100%",background:"rgba(255,255,255,0.07)",
      border:"2px solid "+C.border,borderRadius:"10px",color:C.text,
      fontSize:"15px",padding:"11px 14px",outline:"none",
      marginTop:"8px",display:value==="__other__"?"block":"none"},
      null,{type:"text",placeholder:"Type here…"});
    otherBox.addEventListener("input",e=>onChange("__custom__:"+e.target.value));
    sel.addEventListener("change",e=>{
      otherBox.style.display=e.target.value==="__other__"?"block":"none";
    });
    w.appendChild(otherBox);
  }
  return w;
}

function makeMultiSelect(label,hint,options,selectedArr,onChange){
  const w=fieldWrap(label,hint);
  // Show selected chips
  const chipsWrap=div({display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px",
    minHeight:"28px"});
  function refreshChips(){
    chipsWrap.innerHTML="";
    (selectedArr||[]).forEach(s=>{
      const chip=div({background:C.amber+"22",border:"1px solid "+C.amber+"66",
        borderRadius:"20px",padding:"4px 10px",display:"flex",alignItems:"center",gap:"6px"});
      chip.appendChild(span({fontSize:"12px",fontWeight:"700",color:C.amber},s));
      const x=btn({background:"none",border:"none",color:C.amber,cursor:"pointer",
        padding:"0",fontSize:"14px",lineHeight:"1"},"×",()=>{
        const arr=(selectedArr||[]).filter(i=>i!==s);
        onChange(arr);refreshChips();
      });
      chip.appendChild(x);chipsWrap.appendChild(chip);
    });
    if(!selectedArr||!selectedArr.length)
      chipsWrap.appendChild(span({fontSize:"12px",color:C.muted},"None selected"));
  }
  refreshChips();
  w.appendChild(chipsWrap);
  const pickBtn=btn({width:"100%",background:C.surface,border:"2px solid "+C.border,
    borderRadius:"10px",color:C.muted,fontSize:"14px",fontWeight:"700",
    padding:"10px",cursor:"pointer"},"+ Select Staff",()=>{
    showMultiSelectModal(label,options,selectedArr||[],arr=>{
      onChange(arr);refreshChips();
    });
  });
  w.appendChild(pickBtn);
  return w;
}

function showMultiSelectModal(title,options,current,onDone){
  const root=document.getElementById("modal-root");
  root.innerHTML="";
  const selected=new Set(current);
  const bg=div({position:"fixed",inset:"0",background:"rgba(0,0,0,0.85)",
    zIndex:"500",display:"flex",alignItems:"flex-end",justifyContent:"center"});
  const box=div({background:"#1e1b18",borderRadius:"20px 20px 0 0",padding:"20px",
    width:"100%",maxWidth:"500px",maxHeight:"80vh",overflowY:"auto"});
  box.appendChild(div({fontSize:"15px",fontWeight:"800",color:C.text,
    marginBottom:"14px"},title+" — Select"));
  // Select all
  const allRow=div({display:"flex",justifyContent:"space-between",marginBottom:"10px"});
  allRow.appendChild(btn({background:C.surface,border:"1px solid "+C.border,borderRadius:"8px",
    color:C.muted,fontSize:"13px",padding:"6px 12px",cursor:"pointer"},"Select All",()=>{
    options.forEach(o=>selected.add(o));refreshList();
  }));
  allRow.appendChild(btn({background:C.surface,border:"1px solid "+C.border,borderRadius:"8px",
    color:C.muted,fontSize:"13px",padding:"6px 12px",cursor:"pointer"},"Clear All",()=>{
    selected.clear();refreshList();
  }));
  box.appendChild(allRow);
  const list=div({});
  function refreshList(){
    list.innerHTML="";
    options.forEach(o=>{
      const sel=selected.has(o);
      const row=div({display:"flex",alignItems:"center",gap:"12px",padding:"10px 12px",
        background:sel?C.amber+"15":C.surface,border:"1.5px solid "+(sel?C.amber:C.border),
        borderRadius:"10px",marginBottom:"6px",cursor:"pointer"},null,
        {onClick:()=>{
          sel?selected.delete(o):selected.add(o);refreshList();
        }});
      const chk=div({width:"20px",height:"20px",border:"2px solid "+(sel?C.amber:C.border),
        borderRadius:"5px",background:sel?C.amber:"transparent",
        display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"},
        sel?"✓":"");
      if(sel) chk.style.color="#000";
      row.appendChild(chk);
      row.appendChild(span({fontSize:"14px",fontWeight:"600",color:sel?C.amber:C.text},o));
      list.appendChild(row);
    });
  }
  refreshList();
  box.appendChild(list);
  box.appendChild(div({height:"12px"}));
  box.appendChild(btn({width:"100%",background:C.amber,border:"none",borderRadius:"12px",
    color:"#000",fontWeight:"800",fontSize:"16px",padding:"14px",cursor:"pointer"},
    "Done — "+selected.size+" selected",()=>{
    onDone([...selected]);root.innerHTML="";
  }));
  bg.addEventListener("click",e=>{if(e.target===bg){root.innerHTML="";}});
  bg.appendChild(box);root.appendChild(bg);
}

function makeToggleBtns(label,hint,options,value,onChange,critFn){
  const w=fieldWrap(label,hint);
  const row=div({display:"flex",gap:"7px",flexWrap:options.length>4?"wrap":"nowrap"});
  const btns=[];
  options.forEach(opt=>{
    const isBad=critFn&&critFn(opt);
    const col=isBad?C.red:C.green;
    const sel=value===opt;
    const b=btn({flex:options.length>4?"0 0 calc(50% - 4px)":"1",
      padding:"11px 4px",border:"2px solid "+(sel?col:C.border),
      borderRadius:"10px",background:sel?col+"25":C.surface,
      color:sel?col:C.muted,fontWeight:"700",fontSize:"14px",
      cursor:"pointer",textAlign:"center"},opt,()=>{
      onChange(opt);
      btns.forEach(({b:bb,o})=>{
        const s=o===opt,bad=critFn&&critFn(o),cc=bad?C.red:C.green;
        bb.style.border="2px solid "+(s?cc:C.border);
        bb.style.background=s?cc+"25":C.surface;
        bb.style.color=s?cc:C.muted;
      });
    });
    btns.push({b,o:opt});row.appendChild(b);
  });
  w.appendChild(row);return w;
}

function makeRating5(label,hint,value,onChange){
  const w=fieldWrap(label,hint);
  const row=div({display:"flex",gap:"6px"});
  const btns=[];
  [1,2,3,4,5].forEach(n=>{
    const sel=value===n,col=n<=2?C.red:n===3?C.amber:C.green;
    const b=btn({flex:"1",padding:"11px 0",border:"2px solid "+(sel?col:C.border),
      borderRadius:"10px",background:sel?col+"28":C.surface,
      color:sel?col:C.muted,fontWeight:"800",fontSize:"17px",cursor:"pointer"},
      String(n),()=>{
      onChange(n);
      btns.forEach(({b:bb,n:nn})=>{
        const s=nn===n,cc=nn<=2?C.red:nn===3?C.amber:C.green;
        bb.style.border="2px solid "+(s?cc:C.border);
        bb.style.background=s?cc+"28":C.surface;
        bb.style.color=s?cc:C.muted;
      });
    });
    btns.push({b,n});row.appendChild(b);
  });
  w.appendChild(row);return w;
}

  const next=S.pinInput+d;

  const found=STAFF.find(u=>u.pin===next);
  if(found) setState({user:found,screen:"home",pinInput:"",pinError:false});
  else{setState({pinInput:next,pinError:true});
    setTimeout(()=>setState({pinInput:"",pinError:false}),800);}
}

function submitQCForm(meta){
  const fails=[];
  Object.entries(S.machineData).forEach(([mc,d])=>{
    if(d.prepack_temp&&parseFloat(d.prepack_temp)>40) fails.push(mc+" — Pre-pack >40°C");
    if(d.pest==="Yes"||d.pest==="हाँ") fails.push(mc+" — Pest sighting");
    if(d.ppe==="No"||d.ppe==="नहीं") fails.push(mc+" — PPE fail");
    if(d.jewellery==="Yes"||d.jewellery==="हाँ") fails.push(mc+" — Jewellery worn");
  });
  const entry={id:Date.now(),timestamp:new Date().toISOString(),
    formName:"QC Form",user:S.user.name,role:S.user.role,
    machineData:JSON.parse(JSON.stringify(S.machineData))};
  addLog("QC Form",entry);
  if(fails.length) sendAlerts(fails,"QC Form",S.user.name);
  showToast("✓ QC Form submitted!");setState({screen:"home"});
}

// MACHINE STATUS
function renderMachineStatus(body,meta){
  const tabs=div({display:"flex",flexWrap:"wrap",gap:"7px",marginBottom:"16px",
    paddingBottom:"12px",borderBottom:"1px solid "+C.border});
  MACHINES.forEach(mc=>{
    const isA=mc===S.activeMachine;
    tabs.appendChild(btn({padding:"7px 10px",background:isA?meta.color+"18":C.surface,
      border:"2px solid "+(isA?meta.color:C.border),borderRadius:"20px",
      color:isA?meta.color:C.muted,fontWeight:"800",fontSize:"12px",cursor:"pointer"},
      mc,()=>setState({activeMachine:mc})));
  });
  body.appendChild(tabs);
  const mc=S.activeMachine||MACHINES[0];
  const mcd=S.machinePrams[mc]||{};
  function setMP(param,key,val){
    if(!S.machinePrams[mc]) S.machinePrams[mc]={};
    if(!S.machinePrams[mc][param]) S.machinePrams[mc][param]={};
    S.machinePrams[mc][param][key]=val;
  }
  // Overall status
  body.appendChild(makeDropdown("Machine Status","",["Run","Not-Run"],mcd._status,v=>{
    if(!S.machinePrams[mc]) S.machinePrams[mc]={};
    S.machinePrams[mc]._status=v;
  },false));
  body.appendChild(secHdr("Parameters",meta.color,"⚙"));
  MACHINE_PARAMS.forEach(param=>{
    const pd=mcd[param]||{};
    const pw=div({background:C.surface,border:"1px solid "+C.border,borderRadius:"12px",
      padding:"12px 14px",marginBottom:"10px"});
    pw.appendChild(div({fontSize:"14px",fontWeight:"800",color:C.text,marginBottom:"8px"},param));
    const statusRow=div({display:"flex",gap:"7px",marginBottom:"8px"});
    ["OK","Not OK"].forEach(opt=>{
      const sel=pd.status===opt,col=opt==="Not OK"?C.red:C.green;
      const b=btn({flex:"1",padding:"9px",border:"2px solid "+(sel?col:C.border),
        borderRadius:"8px",background:sel?col+"22":C.surface,
        color:sel?col:C.muted,fontWeight:"700",fontSize:"14px",cursor:"pointer"},opt,()=>{
        setMP(param,"status",opt);
        statusRow.querySelectorAll("button").forEach((bb,i)=>{
          const o=["OK","Not OK"][i],c=o==="Not OK"?C.red:C.green,s=o===opt;
          bb.style.border="2px solid "+(s?c:C.border);
          bb.style.background=s?c+"22":C.surface;
          bb.style.color=s?c:C.muted;
        });
        commentBox.style.display=opt==="Not OK"?"block":"none";
      });
      statusRow.appendChild(b);
    });
    pw.appendChild(statusRow);
    const commentBox=el("textarea",{width:"100%",background:"rgba(255,255,255,0.06)",
      border:"1.5px solid "+C.border,borderRadius:"8px",color:C.text,fontSize:"13px",
      padding:"8px 10px",outline:"none",resize:"none",display:pd.status==="Not OK"?"block":"none"},
      null,{placeholder:"Describe issue…",rows:"2"});
    commentBox.value=pd.comment??"";
    commentBox.addEventListener("input",e=>setMP(param,"comment",e.target.value));
    pw.appendChild(commentBox);
    body.appendChild(pw);
  });
  // Nav
  const idx=MACHINES.indexOf(mc);
  const nav=div({display:"flex",gap:"10px",marginBottom:"12px"});
  if(idx>0) nav.appendChild(btn({flex:"1",background:C.surface,border:"1px solid "+C.border,
    borderRadius:"10px",color:C.muted,fontWeight:"700",fontSize:"13px",padding:"11px",cursor:"pointer"},
    "← "+MACHINES[idx-1],()=>setState({activeMachine:MACHINES[idx-1]})));
  if(idx<MACHINES.length-1) nav.appendChild(btn({flex:"1",background:C.surface,
    border:"1px solid "+meta.color+"66",borderRadius:"10px",color:meta.color,
    fontWeight:"700",fontSize:"13px",padding:"11px",cursor:"pointer"},
    MACHINES[idx+1]+" →",()=>setState({activeMachine:MACHINES[idx+1]})));
  body.appendChild(nav);
  body.appendChild(submitBtn("Submit Machine Status",meta.color,()=>{
    const fails=[];
    Object.entries(S.machinePrams).forEach(([m,params])=>{
      if(params._status==="Not-Run") fails.push(m+" — Not Running");
      Object.entries(params).forEach(([p,pd])=>{
        if(p!=="status"&&p!=="_status"&&pd.status==="Not OK") fails.push(m+" — "+p+": Not OK");
      });
    });
    const entry={id:Date.now(),timestamp:new Date().toISOString(),
      formName:"Machine Status",user:S.user.name,role:S.user.role,
      machineData:JSON.parse(JSON.stringify(S.machinePrams))};
    addLog("Machine Status",entry);
    if(fails.length) sendAlerts(fails.slice(0,8),"Machine Status",S.user.name);
    showToast("✓ Machine Status submitted!");setState({screen:"home"});
  }));
  body.appendChild(div({height:"40px"}));
}

function renderBreakdown(body,meta){
  body.appendChild(secHdr("Breakdown Details",meta.color,"🔴"));
  body.appendChild(makeDateField("Date",gf("date"),v=>sf("date",v)));
  body.appendChild(makeDropdown("Machine No.","",MACHINES,gf("machine"),v=>sf("machine",v)));
  // Issues — multi select with comment per issue
  const issLabel=div({fontSize:"15px",fontWeight:"700",color:C.text,marginBottom:"8px"});
  issLabel.textContent="Breakdown Issues";body.appendChild(issLabel);
  const issHint=div({fontSize:"11px",color:C.muted,marginBottom:"10px"});
  issHint.textContent="Select all that apply. Add details for each.";body.appendChild(issHint);
  const issWrap=div({});
  function refreshIssues(){
    issWrap.innerHTML="";
    BREAKDOWN_ISSUES.forEach(issue=>{
      const sel=(S.breakdownData.issues||[]).includes(issue);
      const row=div({background:sel?meta.color+"12":C.surface,
        border:"1.5px solid "+(sel?meta.color:C.border),
        borderRadius:"10px",padding:"10px 12px",marginBottom:"8px",cursor:"pointer"});
      const top=div({display:"flex",alignItems:"center",gap:"10px"});
      const chk=div({width:"20px",height:"20px",border:"2px solid "+(sel?meta.color:C.border),
        borderRadius:"5px",background:sel?meta.color:"transparent",
        display:"flex",alignItems:"center",justifyContent:"center",
        flexShrink:"0",color:"#000",fontSize:"12px"},sel?"✓":"");
      top.appendChild(chk);
      const issName=span({fontSize:"14px",fontWeight:"700",color:sel?meta.color:C.text},issue);
      top.appendChild(issName);
      row.appendChild(top);
      row.addEventListener("click",()=>{
        const arr=S.breakdownData.issues||[];
        S.breakdownData.issues=sel?arr.filter(i=>i!==issue):[...arr,issue];
        if(!sel&&!S.breakdownData.details[issue]) S.breakdownData.details[issue]="";
        refreshIssues();
      });
      if(sel){
        const det=el("textarea",{width:"100%",background:"rgba(255,255,255,0.07)",
          border:"1.5px solid "+C.border,borderRadius:"8px",color:C.text,
          fontSize:"13px",padding:"8px 10px",outline:"none",resize:"none",
          marginTop:"8px",display:"block"},null,
          {placeholder:"Details for "+issue+"…",rows:"2"});
        det.value=S.breakdownData.details[issue]??"";
        det.addEventListener("click",e=>e.stopPropagation());
        det.addEventListener("input",e=>{S.breakdownData.details[issue]=e.target.value;});
        row.appendChild(det);
      }
      issWrap.appendChild(row);
    });
  }
  refreshIssues();body.appendChild(issWrap);
  body.appendChild(secHdr("Timing & Resolution",C.orange,"🔧"));
  body.appendChild(makeTimeField("Machine Off Time","Time machine stopped",gf("off_time"),v=>sf("off_time",v)));
  body.appendChild(makeTimeField("Machine On Time","Time machine restarted",gf("on_time"),v=>sf("on_time",v)));
  body.appendChild(makeTextArea("Work Done","","Repairs and adjustments made…",gf("work_done"),v=>sf("work_done",v)));
  body.appendChild(makeTextArea("Spares Used","","Part names and quantities…",gf("spares"),v=>sf("spares",v)));
  body.appendChild(makeDropdown("Status","",["Fixed","Partially Fixed","Pending","Ongoing"],gf("bd_status"),v=>sf("bd_status",v),false));
  body.appendChild(makeTextArea("Reported To","","Supervisor name",gf("reported_to"),v=>sf("reported_to",v),1));
  body.appendChild(submitBtn("Submit Breakdown Report",meta.color,()=>{
    const issues=S.breakdownData.issues||[];
    if(!issues.length){showToast("Select at least one issue");return;}
    const fails=[];
    if(gf("bd_status")==="Pending"||gf("bd_status")==="Ongoing")
      fails.push("Breakdown still unresolved on "+gf("machine"));
    const entry={id:Date.now(),timestamp:new Date().toISOString(),
      formName:"Breakdown Report",user:S.user.name,role:S.user.role,
      data:{...S.formData,issues,issueDetails:S.breakdownData.details}};
    addLog("Breakdown Report",entry);
    if(fails.length) sendAlerts(fails,"Breakdown Report",S.user.name);
    showToast("✓ Breakdown submitted!");setState({screen:"home"});
  }));
  body.appendChild(div({height:"40px"}));
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory(){
  const forms=getUserForms(S.user);
  const w=div({minHeight:"100vh",background:C.bg});
  w.appendChild(makeHdr("History",S.user.name,null,
    ()=>setState({screen:"home",historyForm:null}),"← Back"));
  const body=div({padding:"16px 18px",maxWidth:"500px",margin:"0 auto"});
  if(!S.historyForm){
    const lbl=div({fontSize:"11px",fontWeight:"800",color:C.muted,letterSpacing:"0.08em",
      textTransform:"uppercase",marginBottom:"12px"});
    lbl.textContent="Select Form";body.appendChild(lbl);
    forms.forEach(fn=>{
      const logs=getFormLogs(fn);
      const meta=FORM_META[fn]||{icon:"◉",color:C.amber};
      const c=div({background:C.surface,border:"1px solid "+C.border,borderRadius:"12px",
        padding:"14px 16px",marginBottom:"8px",cursor:"pointer",display:"flex",
        alignItems:"center",gap:"12px"},null,{onClick:()=>setState({historyForm:fn})});
      c.appendChild(span({fontSize:"20px"},meta.icon));
      const info=div({flex:"1"});
      const nm=div({fontSize:"14px",fontWeight:"800",color:C.text});nm.textContent=fn;
      info.appendChild(nm);
      const cnt=div({fontSize:"12px",color:C.muted});
      cnt.textContent=logs.length+" submission(s)";info.appendChild(cnt);
      c.appendChild(info);c.appendChild(span({fontSize:"16px",color:C.muted},"→"));
      body.appendChild(c);
    });
  } else {
    const fn=S.historyForm;
    const logs=getFormLogs(fn);
    const meta=FORM_META[fn]||{icon:"◉",color:C.amber};
    body.appendChild(btn({background:C.surface,border:"1px solid "+C.border,borderRadius:"8px",
      color:C.text,padding:"8px 14px",fontSize:"13px",fontWeight:"700",
      cursor:"pointer",marginBottom:"16px"},"← All Forms",
      ()=>setState({historyForm:null})));
    const ttl=div({fontSize:"14px",fontWeight:"800",color:meta.color,marginBottom:"12px"});
    ttl.textContent=meta.icon+" "+fn+" History";body.appendChild(ttl);
    if(!logs.length){
      const nl=div({textAlign:"center",color:C.muted,padding:"40px 0"});
      nl.textContent="No submissions yet";body.appendChild(nl);
    } else {
      logs.forEach(log=>{
        const d=new Date(log.timestamp);
        const card=div({background:C.surface,border:"1px solid "+C.border,borderRadius:"10px",
          padding:"12px 14px",marginBottom:"8px",cursor:"pointer"},null,
          {onClick:()=>setState({screen:"viewer",viewingLog:log})});
        const top=div({display:"flex",justifyContent:"space-between",alignItems:"flex-start"});
        const left=div({flex:"1"});
        const nm=div({fontSize:"13px",fontWeight:"800",color:C.text});
        nm.textContent=log.user+" · "+log.role;left.appendChild(nm);
        if(log.mode||log.shift){
          const md=div({display:"inline-block",fontSize:"10px",fontWeight:"700",
            color:meta.color,background:meta.color+"22",padding:"2px 6px",
            borderRadius:"10px",marginTop:"3px"});
          md.textContent=log.mode||log.shift;left.appendChild(md);
        }
        const dt=div({fontSize:"11px",color:C.muted,marginTop:"3px"});
        dt.textContent=d.toLocaleDateString("en-IN")+" · "+d.toLocaleTimeString("en-IN",
          {hour:"2-digit",minute:"2-digit"});left.appendChild(dt);
        top.appendChild(left);
        const rb=div({display:"flex",gap:"6px",flexShrink:"0",alignItems:"center"});
        rb.appendChild(span({fontSize:"12px",color:C.muted},"View →"));
        rb.appendChild(btn({background:"rgba(232,92,56,0.1)",border:"none",color:C.red,
          borderRadius:"6px",padding:"4px 8px",fontSize:"12px",cursor:"pointer"},"✕",
          e=>{e.stopPropagation();delLog(fn,log.id);render();}));
        top.appendChild(rb);card.appendChild(top);body.appendChild(card);
      });
      body.appendChild(div({height:"12px"}));
      body.appendChild(btn({width:"100%",background:C.blue,border:"none",borderRadius:"10px",
        color:"#fff",fontWeight:"800",fontSize:"15px",padding:"13px",cursor:"pointer"},
        "Export CSV",()=>exportCSV(fn,logs)));
    }
  }
  body.appendChild(div({height:"40px"}));w.appendChild(body);return w;
}

// VIEWER
function renderViewer(){
  const log=S.viewingLog;
  if(!log) return renderHistory();
  const meta=FORM_META[log.formName]||{icon:"◉",color:C.amber};
  const w=div({minHeight:"100vh",background:C.bg});
  w.appendChild(makeHdr(log.formName,
    new Date(log.timestamp).toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}),
    null,()=>setState({screen:"history"}),"← Back"));
  w.appendChild(div({height:"3px",background:meta.color}));
  const body=div({padding:"16px 18px",maxWidth:"500px",margin:"0 auto"});
  const mc=div({background:meta.color+"10",border:"1px solid "+meta.color+"44",
    borderRadius:"12px",padding:"12px 16px",marginBottom:"16px"});
  const ftl=div({fontSize:"14px",fontWeight:"800",color:meta.color});
  ftl.textContent=meta.icon+" "+log.formName;mc.appendChild(ftl);
  const sub=div({fontSize:"13px",color:C.muted,marginTop:"4px"});
  sub.textContent="By: "+log.user+" ("+log.role+")"+(log.shift?" · "+log.shift:"");
  mc.appendChild(sub);body.appendChild(mc);
  function dataRow(k,v){
    if(!v&&v!==0) return;
    const row=div({display:"flex",justifyContent:"space-between",
      padding:"7px 0",borderBottom:"1px solid "+C.border});
    const kEl=span({fontSize:"12px",color:C.muted,flex:"1"},k.replace(/_/g," "));
    const vEl=div({fontSize:"13px",fontWeight:"600",color:C.text,
      textAlign:"right",flex:"2"});
    vEl.textContent=Array.isArray(v)?v.join(", "):String(v);
    row.appendChild(kEl);row.appendChild(vEl);body.appendChild(row);
  }
  if(log.entries){
    log.entries.forEach((e,i)=>{
      const h=div({fontSize:"14px",fontWeight:"800",color:meta.color,
        marginTop:"14px",marginBottom:"6px"});
      h.textContent="Visitor "+(i+1);body.appendChild(h);
      Object.entries(e).forEach(([k,v])=>dataRow(k,v));
    });
  } else if(log.machineData){
    Object.entries(log.machineData).forEach(([mc,data])=>{
      const h=div({fontSize:"13px",fontWeight:"800",color:meta.color,
        marginTop:"14px",marginBottom:"6px"});
      h.textContent=mc;body.appendChild(h);
      if(typeof data==="object"&&data!==null){
        Object.entries(data).forEach(([k,v])=>{
          if(typeof v==="object"&&v!==null) Object.entries(v).forEach(([kk,vv])=>dataRow(mc+" "+k+" "+kk,vv));
          else dataRow(k,v);
        });
      }
    });
  } else if(log.data){
    Object.entries(log.data).forEach(([k,v])=>dataRow(k,v));
  }
  if(log.issues){
    const h=div({fontSize:"13px",fontWeight:"800",color:meta.color,marginTop:"14px",marginBottom:"6px"});
    h.textContent="Issues";body.appendChild(h);
    log.issues.forEach(i=>dataRow("Issue",i));
  }
  if(log.worksCompleted){
    const h=div({fontSize:"13px",fontWeight:"800",color:meta.color,marginTop:"14px",marginBottom:"6px"});
    h.textContent="Works Completed";body.appendChild(h);
    dataRow("Works",log.worksCompleted);
  }
  body.appendChild(div({height:"40px"}));w.appendChild(body);return w;
}

// CSV
function exportCSV(fn,logs){
  const rows=[["Date","Time","User","Role","Field","Value"]];
  logs.forEach(log=>{
    const d=new Date(log.timestamp);
    const base=[d.toLocaleDateString("en-IN"),d.toLocaleTimeString("en-IN"),log.user,log.role];
    const flat=(obj,prefix)=>{
      if(!obj) return;
      Object.entries(obj).forEach(([k,v])=>{
        if(v===null||v===undefined) return;
        if(typeof v==="object"&&!Array.isArray(v)) flat(v,(prefix?prefix+" ":"")+k);
        else rows.push([...base,(prefix?prefix+" ":"")+k,Array.isArray(v)?v.join(", "):String(v)]);
      });
    };
    if(log.machineData) flat(log.machineData,"");
    else if(log.entries) log.entries.forEach((e,i)=>flat(e,"Visitor "+(i+1)));
    else if(log.data) flat(log.data,"");
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v||"").replace(/"/g,"'")+'"').join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=fn.replace(/ /g,"_")+"_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
}

// DAILY REPORT
function sendDailyReport(){
  const today=new Date();
  const todayStr=today.toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  let msg="📋 *RF Factory — Daily Operations Report*\n"+todayStr+"\n━━━━━━━━━━━━━━━━━━━━━━\n\n";
  let total=0;
  Object.keys(FORM_META).forEach(fn=>{
    const logs=getFormLogs(fn).filter(l=>new Date(l.timestamp).toDateString()===today.toDateString());
    if(!logs.length) return;
    total+=logs.length;
    const meta=FORM_META[fn]||{icon:"◉"};
    msg+=meta.icon+" *"+fn+"*: "+logs.length+" submission(s)\n";
    msg+="  By: "+[...new Set(logs.map(l=>l.user))].join(", ")+"\n";
  });
  if(!total) msg+="No submissions recorded today.\n";
  msg+="\n━━━━━━━━━━━━━━━━━━━━━━\n_RF Factory Forms App_";
  sendWA(REPORT_RECV[0].wa,msg);
  if(REPORT_RECV.length>1) setTimeout(()=>sendWA(REPORT_RECV[1].wa,msg),1500);
  showToast("📊 Report sent!");
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  let screen;
  switch(S.screen){
    case "login":   screen=renderLogin(); break;
    case "home":    screen=renderHome(); break;
    case "form":    screen=renderForm(); break;
    case "history": screen=renderHistory(); break;
    case "viewer":  screen=renderViewer(); break;
    default:        screen=renderLogin();
  }
  app.appendChild(screen);
}
render();
